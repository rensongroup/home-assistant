---
# Minimal Home Assistant config for Vistapool development (Core in devcontainer)

homeassistant:
  name: Openmotics Dev
  time_zone: Europe/Brussels
  country: BE
  language: en

# Enable a sane default set of core integrations (UI, config, etc.).
default_config:

# Logging: verbose for your custom integration, quieter for noisy deps.
logger:
  default: info
  logs:
    custom_components.openmotics: debug
    pyhaopenmotics: warning
    homeassistant.components.http: warning

# Lightweight database settings for development (keeps DB small).
recorder:
  #  db_url: sqlite:////config/home-assistant_v2.db
  commit_interval: 30
  auto_purge: true
  purge_keep_days: 3

# Keep recent history/logbook for debugging, without heavy retention.
history:
logbook:
frontend:
api:

# Run with debugpy and wait for debugger to connect
debugpy:
#   start: true
#   wait: true

# Enable this part if you want to use CodeSpaces
# http:
#   use_x_forwarded_for: true
#   trusted_proxies:
#     - 127.0.0.1
#   ip_ban_enabled: true
#   login_attempts_threshold: 3
