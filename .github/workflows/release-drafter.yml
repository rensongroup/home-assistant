---
name: Release Drafter

on:
  push:
    # branches to consider in the event; optional, defaults to all
    branches:
      - master

  # pull_request event is required only for autolabeler
  pull_request:
    # Only following types are handled by the action, but one can default to all as well
    types: [opened, reopened, synchronize]
  # pull_request_target event is required for autolabeler to support PRs from forks
  # pull_request_target:
  #   types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  update_release_draft:
    permissions:
      # write permission is required to create a github release
      contents: write
      # write permission is required for autolabeler
      # otherwise, read permission is required at least
      pull-requests: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from manifest
        id: get_version
        run: |
          # Uses jq to pull the "version" field from your manifest.json
          VERSION=$(jq -r '.version' custom_components/openmotics/manifest.json)
          echo "extracted_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Draft Release
        uses: release-drafter/release-drafter@v6
        with:
          # This forces release-drafter to use your file's version
          # instead of calculating its own
          version: ${{ steps.get_version.outputs.extracted_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
