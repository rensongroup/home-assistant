name: Zip Release

on:
  release:
    types:
      - published

jobs:
  release:
    name: Release openmotics
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Step 1: Check out the code
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

        # Step 2: Create a ZIP archive of the component directory
      - name: 📦 Create zipped release package
        shell: bash
        run: |
          cd "${{ github.workspace }}/custom_components/openmotics"
          zip openmotics.zip -r ./

      # Step 3: Upload ZIP as a release asset (for HACS)
      - name: ⬆️ Upload zip to release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: ${{ github.workspace }}/custom_components/openmotics/openmotics.zip
