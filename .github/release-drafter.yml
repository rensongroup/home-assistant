name-template: "v$RESOLVED_VERSION 🌈"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "🚀 Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "🐛 Bug Fixes"
    labels:
      - "fix"
      - "bugfix"
      - "bug"
  - title: "🧰 Maintenance"
    label: "chore"
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&' # You can add # and @ to disable mentions, and add ` to disable code blocks.
# Overrides the default $MAJOR.$MINOR.$PATCH
version-template: "$MAJOR.$MINOR"
version-resolver:
  # Ensures standard PRs bump the minor version (e.g., 2026.1 -> 2026.2)
  default: minor
  major:
    labels:
      - "new-year" # Use this label on a PR to bump the year
  minor:
    labels:
      - "enhancement"
      - "bug"
      - "feature"
template: |
  ## Changes

  $CHANGES
